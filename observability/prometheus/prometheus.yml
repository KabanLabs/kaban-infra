global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'kaban-nest-service'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['kaban-nest-service:5000']
    http_headers:
      x-api-key:
        secrets: ['12345']

  - job_name: 'kaban-go-auth-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['kaban-go-auth-service:8000']

  - job_name: 'kaban-go-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['kaban-go-service:8888']
